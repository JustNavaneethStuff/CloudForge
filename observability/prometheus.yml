global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: cloudforge
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          service: cloudforge
          environment: local

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889
