name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infrastructure/terraform/**"

env:
  AWS_REGION: ap-south-2
  TF_VERSION: "1.9.0"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infrastructure/terraform

      - name: Validate modules
        run: |
          for dir in infrastructure/terraform/modules/*/; do
            echo "Validating $dir"
            (cd "$dir" && terraform init -backend=false && terraform validate)
          done

      - name: Validate environments
        run: |
          for env in dev prod; do
            echo "Validating $env"
            (cd "infrastructure/terraform/environments/$env" && terraform init -backend=false && terraform validate)
          done

      - name: TFLint
        uses: terraform-linters/setup-tflint@v4

      - run: |
          tflint --init
          tflint --recursive --chdir=infrastructure/terraform

      - name: tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infrastructure/terraform
          soft_fail: false

  plan-dev:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: infrastructure/terraform/environments/dev
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudforge/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        id: plan
        working-directory: infrastructure/terraform/environments/dev
        run: |
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
          echo "plan<<EOF" >> "$GITHUB_OUTPUT"
          cat plan.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment plan on PR
        uses: actions/github-script@v9
        with:
          script: |
            const plan = `${{ steps.plan.outputs.plan }}`;
            const body = `## Terraform Plan (dev)\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${plan.slice(0, 60000)}\n\`\`\`\n\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Run Terraform tests
        run: |
          for dir in infrastructure/terraform/modules/vpc infrastructure/terraform/modules/security-groups; do
            echo "Testing $dir"
            (cd "$dir" && terraform init -backend=false && terraform test)
          done
