name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-2
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Mypy type check
        run: mypy src

      - name: Pytest
        run: pytest tests/ -v

      - name: pip-audit dependency scan
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  build-and-scan:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cloudforge:${{ github.sha }} app/

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: cloudforge:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  push-to-ecr:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set ECR repository
        id: repo
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "url=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/cloudforge-dev" >> "$GITHUB_OUTPUT"

      - name: Build and push
        env:
          ECR_URL: ${{ steps.repo.outputs.url }}
        run: |
          docker build -t "$ECR_URL:${{ github.sha }}" -t "$ECR_URL:latest" app/
          docker push "$ECR_URL:${{ github.sha }}"
          docker push "$ECR_URL:latest"
